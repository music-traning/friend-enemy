<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>潜在フレネミー診断 | The Hidden Karma</title>

    <meta name="theme-color" content="#1a1a1a">
    <meta property="og:title" content="潜在フレネミー診断 | The Hidden Karma">
    <meta property="og:description" content="あなたの中に眠る対人関係の『業』を可視化する。">
    <meta name="twitter:card" content="summary_large_image">

    <style>
        :root {
            --bg-color: #0d0d0d;
            --text-color: #dcdcdc;
            --text-muted: #888888;
            --border-color: #333333;
            --accent-color: #b22222; /* 暗めの赤 */
            --accent-hover: #8b0000;
            --danger-color: #ff4500;
            --card-bg: #1a1a1a;
            --success-color: #556b2f; /* 渋めの緑 */
        }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: "Sawarabi Mincho", "Noto Serif JP", serif; /* おどろおどろしい明朝体に変更 */
            margin: 0;
            padding: 20px 10px;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            background-image: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #000000 100%);
        }
        
        #app-container {
            max-width: 640px;
            margin: 0 auto;
            border: 1px solid var(--border-color);
            border-radius: 4px; /* 丸みを減らす */
            padding: 30px 24px;
            background-color: var(--card-bg);
            box-shadow: 0 4px 30px rgba(178, 34, 34, 0.15); /* 赤黒い影 */
        }
        
        h1, h2, h3 { 
            text-align: center; 
            margin-top: 0; 
            color: #eeeeee;
            font-weight: normal;
            letter-spacing: 2px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }
        
        h1 { font-size: 26px; margin-bottom: 8px; border-bottom: 1px solid var(--accent-color); padding-bottom: 10px; }
        h2 { font-size: 20px; margin-bottom: 16px; }
        h3 { font-size: 16px; margin-bottom: 12px; }
        
        .btn {
            background-color: #111111;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 2px;
            padding: 14px 16px;
            font-family: inherit;
            font-size: 15px;
            letter-spacing: 1px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 12px;
            box-sizing: border-box;
            text-align: center;
            transition: all 0.3s ease;
        }
        
        .btn:hover {
            background-color: var(--accent-color);
            color: #ffffff;
            border-color: var(--accent-hover);
            box-shadow: 0 0 10px rgba(178, 34, 34, 0.5);
        }
        
        .btn:active { transform: translateY(1px); }
        
        .btn-danger { border-color: var(--danger-color); color: var(--danger-color); }
        
        .question-card { 
            border: 1px solid var(--border-color); 
            border-radius: 2px;
            padding: 24px 20px; 
            margin-bottom: 24px; 
            background-color: #111111;
            font-size: 17px;
            line-height: 1.8;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
        }
        
        .options { display: flex; flex-direction: column; gap: 8px; margin-top: 20px; }
        
        .option-btn { 
            background: #1a1a1a; 
            color: var(--text-muted); 
            border: 1px solid var(--border-color); 
            padding: 14px 16px; 
            text-align: left; 
            font-family: inherit; 
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .option-btn:hover { background-color: #222222; color: #cccccc; }
        .option-btn.selected { 
            background: #2a0a0a; 
            border-color: var(--accent-color); 
            color: #ffffff;
        }

        .stat-row { display: flex; align-items: center; margin-bottom: 12px; }
        .stat-label { width: 110px; font-size: 13px; color: #aaaaaa; }
        .stat-bar-container { 
            flex-grow: 1; 
            border: 1px solid var(--border-color); 
            height: 8px; 
            background: #111111; 
            overflow: hidden;
        }
        .stat-bar { 
            height: 100%; 
            background: var(--accent-color); 
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); 
        }

        .history-item { border-bottom: 1px solid var(--border-color); padding: 12px 0; font-size: 14px; }
        
        .hidden { display: none !important; }
        
        .header-controls { display: flex; justify-content: space-between; margin-bottom: 24px; }
        
        footer {
            text-align: center; margin-top: 40px; padding-top: 24px;
            border-top: 1px solid var(--border-color); font-size: 12px; color: var(--text-muted);
        }
    </style>
</head>
<body>

<div id="app-container">
    <div class="header-controls">
        <button id="lang-toggle" style="background:none; color:var(--text-muted); border:1px solid var(--border-color); padding:4px 10px; font-family:inherit; cursor:pointer; font-size:11px;">JA / EN</button>
        <button id="btn-help" onclick="showHelp()" style="background:none; color:var(--text-muted); border:1px solid var(--border-color); padding:4px 10px; font-family:inherit; cursor:pointer; font-size:11px;"></button>
    </div>

    <div id="screen-home">
        <h1 id="ui-title"></h1>
        <p id="ui-desc" style="text-align:center; font-size:13px; margin-bottom:30px; color: var(--text-muted);"></p>

        <p id="ui-about-content" style="font-size: 13px; line-height: 1.8; color: #bbbbbb; text-align: center; margin-bottom: 30px; border: 1px solid var(--border-color); padding: 16px; background: #111111;"></p>

        <button class="btn" onclick="startQuiz()" id="btn-tier1" style="border-color: var(--accent-color); color: var(--accent-color);"></button>

        <div style="margin-top: 40px; border-top: 1px solid var(--border-color); padding-top: 24px;">
            <h3 id="ui-history-title"></h3>
            <div id="history-list"></div>
            <button class="btn btn-danger hidden" id="btn-clear-history" onclick="clearHistory()" style="margin-top:12px; font-size: 12px; padding: 8px;"></button>
        </div>
    </div>

    <div id="screen-quiz" class="hidden">
        <div style="margin-bottom: 20px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                <h3 id="quiz-progress" style="margin: 0; color: var(--accent-color); font-size: 13px; letter-spacing: 1px;"></h3>
                <button id="btn-quiz-abort" onclick="abortQuiz()" style="background:none; border:none; color:var(--text-muted); cursor:pointer; font-family:inherit; font-size:12px;"></button>
            </div>
            <div style="width: 100%; height: 2px; background: #333333; overflow: hidden;">
                <div id="progress-bar" style="height: 100%; background: var(--accent-color); width: 0%; transition: width 0.4s ease-out;"></div>
            </div>
        </div>
        <div class="question-card" id="question-text"></div>
        <div class="options" id="quiz-options"></div>
        <div style="display:flex; gap:12px; margin-top:30px;">
            <button class="btn" onclick="prevQuestion()" id="btn-prev" style="width:30%; background: #111;"></button>
            <button class="btn" onclick="nextQuestion()" id="btn-next" style="width:70%; border-color: var(--accent-color); color: var(--accent-color);"></button>
        </div>
    </div>

    <div id="screen-result" class="hidden">
        <div style="text-align: center; margin-bottom: 8px; font-size: 13px; letter-spacing: 2px; color: var(--text-muted);" id="result-type"></div>
        <h2 id="result-title" style="margin-bottom: 30px; font-size: 24px; color: var(--accent-color); text-shadow: 0 0 10px rgba(178,34,34,0.5);"></h2>
        
        <div style="margin-bottom: 30px; border: 1px solid var(--border-color); padding: 20px 16px; background-color: #111111;">
            <div class="stat-row"><div class="stat-label" id="label-axis1"></div><div class="stat-bar-container"><div id="bar-axis1" class="stat-bar"></div></div></div>
            <div class="stat-row"><div class="stat-label" id="label-axis2"></div><div class="stat-bar-container"><div id="bar-axis2" class="stat-bar"></div></div></div>
            <div class="stat-row"><div class="stat-label" id="label-axis3"></div><div class="stat-bar-container"><div id="bar-axis3" class="stat-bar"></div></div></div>
            <div class="stat-row"><div class="stat-label" id="label-axis4"></div><div class="stat-bar-container"><div id="bar-axis4" class="stat-bar"></div></div></div>
        </div>
        
        <p id="result-profile" style="font-size: 15px; line-height: 1.9; color: #cccccc; margin-bottom: 30px; text-align: justify;"></p>
        
        <div style="border:1px solid #330000; padding: 16px; margin-top: 20px; background-color: #1a0505;">
            <strong id="ui-action-plan" style="color: var(--accent-color); font-size: 13px; display: block; margin-bottom: 8px;"></strong>
            <span id="result-action" style="font-size: 14px; line-height: 1.8; color: #bbbbbb;"></span>
            
            <strong id="ui-worst-partner" style="color: var(--accent-color); font-size: 13px; display: block; margin-top: 24px; margin-bottom: 8px;"></strong>
            <span id="result-worst-partner" style="font-size: 14px; line-height: 1.8; color: #bbbbbb; display: block;"></span>
            
            <strong id="ui-defense" style="color: var(--accent-color); font-size: 13px; display: block; margin-top: 24px; margin-bottom: 8px;"></strong>
            <span id="result-defense" style="font-size: 14px; line-height: 1.8; color: #bbbbbb; display: block;"></span>
            
            <strong id="ui-salvation" style="color: var(--accent-color); font-size: 13px; display: block; margin-top: 24px; margin-bottom: 8px;"></strong>
            <span id="result-salvation" style="font-size: 14px; line-height: 1.8; color: #bbbbbb; display: block;"></span>
        </div>
        
        <button class="btn" onclick="shareOnX()" style="margin-top: 30px; background-color: #000000; color: #ffffff; border-color: #333333;" id="btn-share-x"></button>
        <button class="btn" onclick="goHome()" style="margin-top: 10px; background: none; border: none; color: var(--text-muted);" id="btn-home"></button>
    </div>

    <div id="screen-help" class="hidden">
        <h2 id="ui-help-title" style="color: var(--accent-color);"></h2>
        <p id="ui-help-desc" style="font-size: 12px; text-align: center; color: var(--text-muted); margin-bottom: 20px;"></p>
        <div id="help-list" style="max-height: 420px; overflow-y: auto; border: 1px solid var(--border-color); padding: 16px; background: #111111;"></div>
        <button class="btn" onclick="closeHelp()" style="margin-top: 24px;" id="btn-close-help"></button>
    </div>

    <footer>
        <p style="margin: 0;">© 2026 United Make Associates</p>
    </footer>

</div>

<script src="./data.js"></script>
<script src="./logic.js"></script>
<script src="./main.js"></script>

</body>
</html>
